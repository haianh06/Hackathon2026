
services:
  # ===== Database =====
  mongodb:
    image: mongo:7
    container_name: hackathon-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: delivery_bot
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: hackathon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-network

  # ===== Backend (Node.js API + Socket.IO) =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/delivery_bot?authSource=admin
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      ENABLE_HARDWARE: "true"
      HARDWARE_DOCKER: "true"
      ROADSIGN_URL: http://roadsign:9001
      DETECT_OBJECT_URL: http://detect-object:9002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode===200?0:1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  # ===== Hardware Daemon (Python - motor, camera, line-following) =====
  hardware:
    build:
      context: ./backend
      dockerfile: hardware/Dockerfile
    container_name: hackathon-hardware
    restart: unless-stopped
    privileged: true
    ports:
      - "8765:8765"
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /sys/class/pwm:/sys/class/pwm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./hardware.env
      - ./lane.env
    environment:
      SERVER_URL: http://backend:5000
      CAMERA_HOST: host.docker.internal
      CAMERA_PORT: "8554"
      # Thread limits to prevent CPU overload
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/camera/status')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  # ===== Road Sign Detector (C++ ONNX Runtime — high-perf CPU inference) =====
  roadsign:
    build:
      context: ./backend/detect-road-sign
      dockerfile: Dockerfile
    container_name: hackathon-roadsign
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      MODEL_PATH: /app/detect-road-sign/best_yolo.onnx
      CONF_THRESHOLD: "0.5"
      NMS_IOU_THRESHOLD: "0.45"
      NUM_THREADS: "2"
      INPUT_SIZE: "640"
      DETECT_PORT: "9001"
      DETECT_INTERVAL_MS: "300"
      # Camera mode: "mjpeg" (HTTP stream from hardware daemon)
      CAMERA_MODE: "mjpeg"
      V4L2_DEVICE: "/dev/video0"
      V4L2_WIDTH: "640"
      V4L2_HEIGHT: "480"
      # MJPEG fallback URL (used if CAMERA_MODE=mjpeg)
      CAMERA_MJPEG_URL: http://hardware:8765/stream
      BACKEND_HOST: backend
      BACKEND_PORT: "5000"
      # Pin ONNX inference to cores 2-3 (cores 0=system, 1=camera I/O)
      OMP_NUM_THREADS: "2"
      GOMP_CPU_AFFINITY: "2-3"
      USE_FP16: "false"
    depends_on:
      - backend
    networks:
      - app-network

  # ===== Frontend (React + Nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Qua nginx proxy, frontend gọi cùng origin
        REACT_APP_API_URL: /api
        REACT_APP_SOCKET_URL: /
    container_name: hackathon-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - hardware
    networks:
      - app-network

  # ===== Object Detector (Python — custom detection algorithms) =====
  detect-object:
    build:
      context: ./backend
      dockerfile: detect-object/Dockerfile
    container_name: hackathon-detect-object
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      BACKEND_URL: http://backend:5000
      CAMERA_MJPEG_URL: http://hardware:8765/stream
      DETECT_PORT: "9002"
      DETECT_INTERVAL_MS: "500"
      CONF_THRESHOLD: "0.5"
      PYTHONUNBUFFERED: "1"
    depends_on:
      backend:
        condition: service_healthy
      hardware:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
